<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="Menlo, Consolas, monospace" font-size="14">
  <rect width="720" height="400" rx="10" fill="#101418"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="360" y="27" fill="#8b949e" text-anchor="middle" font-size="12">botsign — who did what, cryptographically</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> botsign verify /tmp/botsign-demo</text>
    <text x="24" y="92"><tspan fill="#79c0ff">botsign verify</tspan> — botsign-demo @ be16cf5 (main)</text>
    <text x="24" y="114" fill="#8b949e">range: HEAD · 4 commits</text>
    <text x="24" y="148">  be16cf5  <tspan fill="#ff7b72">unsigned</tspan>       <tspan fill="#d2a8ff">claude-code-27a11a7e</tspan>     Tune the limiter defaults</text>
    <text x="24" y="170" fill="#ff7b72">           └─ committer claims a botsign identity but the commit is unsigned</text>
    <text x="24" y="192">  1a62bd8  <tspan fill="#8b949e">unmanaged</tspan>      —                        Document restarts</text>
    <text x="24" y="214">  a7b3f58  <tspan fill="#7ee787">verified</tspan>       <tspan fill="#d2a8ff">claude-code-27a11a7e</tspan>     Cover the limiter window</text>
    <text x="24" y="236">  69564b3  <tspan fill="#7ee787">verified</tspan>       <tspan fill="#d2a8ff">claude-code-27a11a7e</tspan>     Add rate limiter</text>
    <text x="24" y="270">summary: <tspan fill="#7ee787">2 verified</tspan> · <tspan fill="#8b949e">1 unmanaged</tspan> · <tspan fill="#ff7b72">1 unsigned</tspan></text>
    <text x="24" y="292">verify: <tspan fill="#ff7b72">FAIL (1 failing commit)</tspan></text>
    <text x="24" y="330"><tspan fill="#7ee787">$</tspan> git verify-commit HEAD~2   <tspan fill="#8b949e"># stock git agrees — botsign is its ssh backend</tspan></text>
    <text x="24" y="352"><tspan fill="#7ee787">Good "git" signature</tspan> for claude-code+27a11a7e@botsign.invalid</text>
    <text x="24" y="374">with ED25519 key SHA256:J6EafltdlgjWWymzgGxLiiBWvictqx1bJuFLFRKhPZE</text>
  </g>
</svg>
